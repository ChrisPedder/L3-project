<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L3 Failure Analysis – PDF Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-wrapper">

    <nav class="breadcrumb">
      <a href="index.html">PDF Documents</a> &rsaquo; L3 Failure Analysis
    </nav>

    <header class="site-header">
      <h1>L3 Failure Analysis</h1>
      <p>Post-flight failure analysis for the L3 certification attempt on 11 April 2026.</p>
    </header>

    <main>
      <div id="pdf-container" class="pdf-container">
        <canvas id="pdf-canvas"></canvas>
        <div id="text-layer" class="text-layer"></div>
        <div id="annotation-layer" class="annotation-layer"></div>
      </div>

      <!-- Page navigation controls -->
      <div id="pdf-controls" style="display:flex; align-items:center; justify-content:center; gap:1rem; margin-bottom:2rem; flex-wrap:wrap;">
        <button id="prev-page" aria-label="Previous page">&laquo; Previous</button>
        <span id="page-info" style="font-size:0.9rem; color:var(--colour-muted);">Loading&hellip;</span>
        <button id="next-page" aria-label="Next page">Next &raquo;</button>
      </div>

      <section class="comments-section">
        <h2>Discussion</h2>
        <div class="giscus-container"></div>
      </section>
    </main>

    <footer class="site-footer">
      L3 Project &middot; PDF Viewer
    </footer>

  </div>

  <!-- PDF.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module"></script>

  <script type="module">
    // ── PDF path ──────────────────────────────────────────────────
    const PDF_URL = "docs/L3 Failure Analysis.pdf";
    // ──────────────────────────────────────────────────────────────

    const pdfjsLib = await import("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs");
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs";

    const canvas    = document.getElementById("pdf-canvas");
    const ctx       = canvas.getContext("2d");
    const textLayer = document.getElementById("text-layer");
    const info      = document.getElementById("page-info");
    const prevBtn   = document.getElementById("prev-page");
    const nextBtn   = document.getElementById("next-page");

    let pdfDoc    = null;
    let pageNum   = 1;
    let rendering = false;
    let pending   = null;
    let currentTextLayer = null;

    async function renderPage(num) {
      rendering = true;
      const page     = await pdfDoc.getPage(num);
      const container = document.getElementById("pdf-container");
      const desiredWidth = container.clientWidth;
      const unscaledViewport = page.getViewport({ scale: 1 });
      const scale = desiredWidth / unscaledViewport.width;
      const viewport = page.getViewport({ scale });

      canvas.height = viewport.height;
      canvas.width  = viewport.width;

      container.style.paddingTop = "0";
      container.style.height     = viewport.height + "px";

      await page.render({ canvasContext: ctx, viewport }).promise;

      if (currentTextLayer) {
        currentTextLayer.cancel();
      }
      textLayer.innerHTML = "";
      textLayer.style.width  = viewport.width + "px";
      textLayer.style.height = viewport.height + "px";

      const textContent = await page.getTextContent();
      currentTextLayer = new pdfjsLib.TextLayer({
        textContentSource: textContent,
        container: textLayer,
        viewport: viewport,
      });
      await currentTextLayer.render();

      const annotationLayerDiv = document.getElementById("annotation-layer");
      annotationLayerDiv.innerHTML = "";
      annotationLayerDiv.style.width  = viewport.width + "px";
      annotationLayerDiv.style.height = viewport.height + "px";

      const annotations = await page.getAnnotations();
      for (const annotation of annotations) {
        if (annotation.subtype !== "Link" || !annotation.url) continue;

        const rect = viewport.convertToViewportRectangle(annotation.rect);
        const left   = Math.min(rect[0], rect[2]);
        const top    = Math.min(rect[1], rect[3]);
        const width  = Math.abs(rect[2] - rect[0]);
        const height = Math.abs(rect[3] - rect[1]);

        const link = document.createElement("a");
        link.href   = annotation.url;
        link.target = "_blank";
        link.rel    = "noopener noreferrer";
        link.title  = annotation.url;
        link.style.position = "absolute";
        link.style.left   = left + "px";
        link.style.top    = top + "px";
        link.style.width  = width + "px";
        link.style.height = height + "px";
        annotationLayerDiv.appendChild(link);
      }

      rendering = false;
      info.textContent = `Page ${num} of ${pdfDoc.numPages}`;

      if (pending !== null) {
        renderPage(pending);
        pending = null;
      }
    }

    function queueRender(num) {
      if (rendering) { pending = num; } else { renderPage(num); }
    }

    prevBtn.addEventListener("click", () => {
      if (pageNum <= 1) return;
      pageNum--;
      queueRender(pageNum);
    });

    nextBtn.addEventListener("click", () => {
      if (!pdfDoc || pageNum >= pdfDoc.numPages) return;
      pageNum++;
      queueRender(pageNum);
    });

    try {
      pdfDoc = await pdfjsLib.getDocument(PDF_URL).promise;
      renderPage(pageNum);
    } catch (err) {
      info.textContent = "Could not load PDF. Check the file path.";
      console.error("PDF.js error:", err);
    }

    let resizeTimer;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => queueRender(pageNum), 200);
    });
  </script>

  <!-- Giscus config (centralised) -->
  <script src="giscus-config.js"></script>
  <script>
    if (typeof injectGiscus === "function") {
      injectGiscus(".giscus-container");
    }
  </script>

  <!-- Hypothes.is – inline annotation on the PDF text layer -->
  <script src="https://hypothes.is/embed.js" async></script>
</body>
</html>
